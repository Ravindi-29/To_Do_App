<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Planner & To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Header / Role Switcher -->
        <header class="app-header">
            <div class="header-title">
                <h1><span id="role-indicator">User</span> Workspace</h1>
            </div>
            <div class="role-toggle">
                <label class="switch">
                    <input type="checkbox" id="role-switch">
                    <span class="slider round"></span>
                </label>
                <span class="toggle-label">Admin Mode</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Sidebar for Adding Tasks (Admin & User) -->
            <aside class="sidebar windows-panel">
                <h2>Add New Task</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="task-name">Task Description</label>
                        <input type="text" id="task-name" placeholder="E.g., Finish report..." required>
                    </div>

                    <div class="form-group" id="day-selection-group">
                        <label for="task-day">Assign to Day</label>
                        <select id="task-day">
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                            <option value="Sunday">Sunday</option>
                        </select>
                    </div>

                    <!-- Type is auto-assigned based on current role, or Admin can explicitly create Admin tasks -->
                    <button type="submit" class="btn-primary">Add Task</button>
                </form>

                <div class="status-panel">
                    <h3>Current Day</h3>
                    <div id="current-day-display" class="highlight-day">Monday</div>
                    <p class="info-text">Unfinished tasks will automatically move to the current day!</p>
                    <button id="simulate-next-day" class="btn-secondary">Simulate Next Day ⏩</button>
                </div>
            </aside>

            <!-- Weekly Planner View -->
            <section class="planner-view windows-panel">
                <h2>Weekly Planner</h2>
                <div class="week-grid" id="week-grid">
                    <!-- Days will be generated by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modals or overlays if needed -->

    <script src="script.js"></script>
</body>

</html>
